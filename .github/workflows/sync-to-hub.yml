name: Sync to Hugging Face Hub

on:
  push:
    branches: [master]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "tusharkhoche@users.noreply.github.com"
          git config user.name "tushark2111"
          git remote add hf https://tushark2111:${HF_TOKEN}@huggingface.co/spaces/tushark2111/focused-research-agent
          git push hf master:main --force